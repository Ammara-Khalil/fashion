name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # Changed from 18 to 20
          cache: 'npm'       # Add caching for faster installs
          
      - name: Clean install (fix for native binding issue)
        run: |
          rm -rf node_modules package-lock.json
          npm install --force  # Force install to rebuild native modules
          
      - name: Verify Node version
        run: node --version
          
      - name: Build React app
        run: |
          echo "Building with base: './'"
          npm run build
          
      - name: Verify build output
        run: |
          echo "=== Contents of dist folder ==="
          ls -la dist/
          echo "=== index.html paths (should be ./assets) ==="
          cat dist/index.html
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true